<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Movie Ideas">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Movie Ideas">
<meta name="theme-color" content="#f1ebe0">
<meta name="format-detection" content="telephone=no">
<title>Movie Ideas — Jordan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f1ebe0;
    --paper: #f8f3e8;
    --ink: #1a1a1a;
    --faded: #6b655a;
    --accent-red: #c1272d;
    --accent-gold: #b8944d;
    --accent-blue: #2c5f7c;
    --line: #c7bfae;
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top, rgba(193,39,45,0.04) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.008) 2px, rgba(0,0,0,0.008) 3px);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ============ HEADER ============ */
  .header {
    text-align: center;
    padding: 30px 20px 40px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 40px;
    position: relative;
  }

  .header::before, .header::after {
    content: '✦';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent-red);
    font-size: 14px;
  }
  .header::before { left: 20px; }
  .header::after { right: 20px; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--faded);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .title {
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: clamp(38px, 7vw, 62px);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .subtitle {
    font-style: italic;
    font-size: 18px;
    color: var(--faded);
    letter-spacing: 0.02em;
  }

  .byline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--faded);
    text-transform: uppercase;
    margin-top: 14px;
  }

  /* ============ CONTROLS ============ */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }

  .search-bar {
    flex: 1;
    min-width: 200px;
    padding: 11px 16px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: all 0.2s;
  }
  .search-bar:focus {
    border-color: var(--accent-red);
    box-shadow: 3px 3px 0 var(--accent-red);
    transform: translate(-1px,-1px);
  }
  .search-bar::placeholder { color: var(--faded); }

  .btn {
    padding: 11px 16px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover {
    background: var(--ink);
    color: var(--paper);
    transform: translate(-1px,-1px);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .btn.gold:hover { background: var(--accent-gold); border-color: var(--accent-gold); box-shadow: 3px 3px 0 var(--accent-gold); }
  .btn.red:hover { background: var(--accent-red); border-color: var(--accent-red); box-shadow: 3px 3px 0 var(--accent-red); }
  .btn.blue:hover { background: var(--accent-blue); border-color: var(--accent-blue); box-shadow: 3px 3px 0 var(--accent-blue); }

  .filter-btn { display: inline-flex; align-items: center; gap: 8px; }
  .filter-btn .dot { margin-right: 0; width: 10px; height: 10px; }
  .filter-btn.active[data-filter="gold"] {
    background: var(--accent-gold);
    border-color: var(--accent-gold);
    color: var(--paper);
    box-shadow: 3px 3px 0 var(--ink);
    transform: translate(-1px,-1px);
  }
  .filter-btn.active[data-filter="blue"] {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: var(--paper);
    box-shadow: 3px 3px 0 var(--ink);
    transform: translate(-1px,-1px);
  }
  .filter-btn.active[data-filter="red"] {
    background: var(--accent-red);
    border-color: var(--accent-red);
    color: var(--paper);
    box-shadow: 3px 3px 0 var(--ink);
    transform: translate(-1px,-1px);
  }
  .filter-btn.active .dot { background: var(--paper) !important; }

  /* ============ PROGRESS ============ */
  .progress {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 14px 18px;
    margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .progress strong { color: var(--accent-red); font-weight: 500; }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.gold { background: var(--accent-gold); }
  .dot.red  { background: var(--accent-red); }
  .dot.blue { background: var(--accent-blue); }

  /* ============ LIST ============ */
  .list {
    list-style: none;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 8px 0;
    counter-reset: idea;
  }

  .list li {
    border-bottom: 1px dashed var(--line);
    transition: background 0.15s;
    counter-increment: idea;
  }
  .list li:last-child { border-bottom: none; }
  .list li.hidden { display: none; }

  .row {
    display: grid;
    grid-template-columns: 32px 22px 22px 22px 22px 1fr 26px 28px;
    gap: 10px;
    align-items: center;
    padding: 12px 20px;
    cursor: default;
  }
  .list li:hover .row { background: rgba(193,39,45,0.04); }

  /* On desktop, the action wrapper is invisible — children flow as grid items */
  .actions-wrap { display: contents; }

  .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--faded);
    letter-spacing: 0.05em;
    padding-top: 4px;
  }
  .num::before {
    content: counter(idea, decimal-leading-zero);
  }

  /* hide checkbox, style its button */
  .list input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border: 1.5px solid var(--ink);
    background: transparent;
    cursor: pointer;
    margin-top: 3px;
    position: relative;
    transition: all 0.15s;
  }
  .list input[type="checkbox"]:hover { background: rgba(0,0,0,0.05); }
  .list input[type="checkbox"]:checked {
    background: var(--ink);
  }
  .list input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    color: var(--paper);
    font-size: 14px;
    font-weight: bold;
  }

  .color-btn {
    width: 18px; height: 18px;
    border: 1.5px solid var(--ink);
    background: transparent;
    cursor: pointer;
    margin-top: 3px;
    padding: 0;
    transition: all 0.15s;
  }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.gold.active { background: var(--accent-gold); border-color: var(--accent-gold); }
  .color-btn.red.active  { background: var(--accent-red);  border-color: var(--accent-red); }
  .color-btn.blue.active { background: var(--accent-blue); border-color: var(--accent-blue); }

  .idea {
    font-size: 17px;
    line-height: 1.5;
    padding-top: 1px;
    transition: all 0.2s;
  }
  .idea em { color: var(--accent-red); font-style: italic; }

  /* checked styling */
  .list li.checked-item .idea {
    text-decoration: line-through;
    text-decoration-thickness: 1.5px;
    color: var(--faded);
  }

  /* ====== EXPAND BUTTON ====== */
  .expand-btn {
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    padding: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1;
    color: var(--ink);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .expand-btn:hover {
    background: var(--ink);
    color: var(--paper);
  }
  .expand-btn::before { content: '+'; font-weight: bold; }
  li.expanded .expand-btn::before { content: '−'; }

  /* edit button */
  .edit-btn {
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--line);
    background: transparent;
    cursor: pointer;
    padding: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1;
    color: var(--faded);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .edit-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
    background: var(--paper);
  }
  .edit-btn::before { content: '✎'; }

  /* when notes/cast exist, flip the expand button to filled */
  .expand-btn.has-content {
    background: var(--ink);
    color: var(--paper);
  }
  .expand-btn.has-content:hover {
    background: var(--paper);
    color: var(--ink);
  }

  /* inline edit mode */
  .idea-edit {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--accent-red);
    background: var(--paper);
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--ink);
    outline: none;
    line-height: 1.5;
    resize: vertical;
    min-height: 40px;
  }
  .idea-edit-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .edit-save, .edit-cancel {
    padding: 5px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1.5px solid var(--ink);
    transition: all 0.15s;
  }
  .edit-save {
    background: var(--ink);
    color: var(--paper);
  }
  .edit-save:hover {
    background: var(--accent-red);
    border-color: var(--accent-red);
  }
  .edit-cancel {
    background: var(--paper);
    color: var(--ink);
  }
  .edit-cancel:hover {
    background: var(--faded);
    color: var(--paper);
    border-color: var(--faded);
  }

  /* ====== PANEL ====== */
  .panel {
    display: none;
    padding: 18px 20px 22px 64px;
    background: rgba(0,0,0,0.02);
    border-top: 1px dashed var(--line);
    animation: fadeIn 0.2s;
  }
  li.expanded .panel { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--faded);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .panel textarea {
    width: 100%;
    min-height: 70px;
    padding: 10px 12px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 14px;
    color: var(--ink);
    resize: vertical;
    outline: none;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .panel textarea:focus {
    border-color: var(--accent-red);
  }

  .cast-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .cast-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px 6px 12px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
  }
  .cast-chip .role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--faded);
    text-transform: uppercase;
    font-style: normal;
    margin-right: 4px;
  }
  .cast-chip .remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--faded);
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
  }
  .cast-chip .remove:hover { color: var(--accent-red); }

  .cast-add {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cast-add input {
    padding: 8px 10px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    color: var(--ink);
  }
  .cast-add input:focus { border-color: var(--accent-red); }
  .cast-add .role-input { width: 130px; }
  .cast-add .name-input { flex: 1; min-width: 140px; }
  .cast-add button {
    padding: 8px 14px;
    background: var(--ink);
    color: var(--paper);
    border: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .cast-add button:hover { background: var(--accent-red); border-color: var(--accent-red); }

  /* color row states */
  li.gold-on  { background: rgba(184,148,77,0.10); }
  li.red-on   { background: rgba(193,39,45,0.10); }
  li.blue-on  { background: rgba(44,95,124,0.10); }
  li.gold-on.red-on, li.gold-on.blue-on, li.red-on.blue-on { background: rgba(184,148,77,0.15); }

  /* ============ FOOTER ============ */
  .backup-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 28px;
    padding: 14px 18px;
    background: var(--paper);
    border: 1.5px solid var(--line);
  }
  .save-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent-green, #4a6b3a);
    text-transform: uppercase;
    transition: opacity 0.4s, color 0.4s;
  }
  .save-indicator.saving {
    color: var(--faded);
  }
  .backup-btn {
    padding: 8px 14px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }
  .backup-btn:hover {
    background: var(--ink);
    color: var(--paper);
    transform: translate(-1px,-1px);
    box-shadow: 3px 3px 0 var(--ink);
  }

  .footer {
    text-align: center;
    padding: 40px 20px 0;
    margin-top: 50px;
    border-top: 2px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--faded);
    text-transform: uppercase;
  }
  .footer .reel {
    font-size: 20px;
    color: var(--accent-red);
    letter-spacing: 0.5em;
    margin-bottom: 10px;
  }

  /* legend */
  .legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--faded);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding: 10px 2px;
  }
  .legend span { display: inline-flex; align-items: center; }

  /* ====== ADD NEW IDEA ====== */
  .add-new {
    margin-top: 28px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 22px 24px;
    position: relative;
  }
  .add-new::before {
    content: 'NEW SCENE';
    position: absolute;
    top: -9px;
    left: 20px;
    background: var(--bg);
    padding: 0 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent-red);
  }
  .add-new-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--faded);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .add-new-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .add-new textarea {
    width: 100%;
    min-height: 80px;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--ink);
    resize: vertical;
    outline: none;
    line-height: 1.5;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }
  .add-new textarea:focus { border-color: var(--accent-red); }
  .add-new textarea::placeholder { color: var(--faded); font-style: italic; }
  .add-new .submit-btn {
    padding: 12px 24px;
    background: var(--ink);
    color: var(--paper);
    border: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .add-new .submit-btn:hover {
    background: var(--accent-red);
    border-color: var(--accent-red);
    transform: translate(-1px,-1px);
    box-shadow: 3px 3px 0 var(--accent-red);
  }
  @media (max-width: 640px) {
    /* Container & header */
    .container { padding: 14px 10px 50px; max-width: 100%; }
    .header { padding: 16px 8px 22px; margin-bottom: 22px; }
    .header::before, .header::after { display: none; }
    .eyebrow { font-size: 9px; letter-spacing: 0.28em; margin-bottom: 10px; }
    .title { font-size: 38px; }
    .subtitle { font-size: 14px; }
    .byline { font-size: 9px; margin-top: 10px; }

    /* Toolbar — stack search + filters */
    .controls {
      flex-direction: column;
      gap: 8px;
    }
    .controls .search-bar {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      -webkit-appearance: none;
      border-radius: 0;
    }
    .controls .filter-btn {
      flex: 1;
      min-width: 0;
      padding: 11px 4px;
      font-size: 9px;
      letter-spacing: 0.08em;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .controls .filter-btn .dot {
      width: 8px; height: 8px;
      margin-right: 0;
    }
    .controls > .btn:not(.filter-btn) {
      width: 100%;
      padding: 12px;
    }

    /* Legend — smaller, wraps */
    .legend {
      font-size: 9px;
      gap: 12px;
      padding: 10px 4px;
      justify-content: center;
    }
    .legend span:last-child { display: none; }

    /* Progress bar */
    .progress {
      font-size: 10px;
      padding: 11px 13px;
      letter-spacing: 0.05em;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    /* THE LIST */
    .list { padding: 2px 0; }

    .list li { border-bottom: 1px solid var(--line); }
    .list li:last-child { border-bottom: none; }

    /* Stack: number+idea on top, action buttons below */
    .row {
      display: grid;
      grid-template-columns: 28px 1fr;
      grid-template-areas:
        "num idea"
        "actions actions";
      gap: 4px 8px;
      padding: 14px 12px 12px;
    }

    .num { grid-area: num; font-size: 10px; padding-top: 4px; }
    .idea {
      grid-area: idea;
      font-size: 16px;
      line-height: 1.45;
      word-break: break-word;
    }

    /* Action wrapper as flex bar on mobile */
    .actions-wrap {
      display: flex;
      grid-area: actions;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }

    /* Bigger tap targets (Material guidelines say 48dp = ~48px) */
    .list input[type="checkbox"] {
      width: 26px; height: 26px;
      margin-top: 0;
      flex-shrink: 0;
    }
    .list input[type="checkbox"]:checked::after {
      font-size: 17px;
    }
    .color-btn {
      width: 30px; height: 30px;

    /* Panel (notes/cast dropdown) */

<body>

</div>

const list = document.getElementById('list');

function render(order) {
  list.innerHTML = '';
  order.forEach((i) => {
    const li = document.createElement('li');
    li.dataset.id = i;
    li.dataset.text = ideas[i].replace(/<[^>]+>/g,'').toLowerCase();
    li.innerHTML = `
      <div class="row">
        <div class="num"></div>
        <div class="idea">${ideas[i]}</div>
        <div class="actions-wrap">
          <input type="checkbox" onchange="handleCheck(this)">
          <button class="color-btn gold" title="Favorite" onclick="toggleColor(this,'gold')"></button>
          <button class="color-btn blue" title="Written" onclick="toggleColor(this,'blue')"></button>
          <button class="color-btn red" title="Ready to shoot" onclick="toggleColor(this,'red')"></button>
          <button class="edit-btn" title="Edit" onclick="startEdit(this, ${i})"></button>
          <button class="expand-btn" title="Notes & cast" onclick="toggleExpand(this)"></button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-label">Notes</div>
        <textarea placeholder="Add ideas, shots, locations, references..." oninput="updateContentIndicator(this)"></textarea>
        <div class="panel-label">Cast &amp; Crew</div>
        <div class="cast-list"></div>
        <div class="cast-add">
          <input type="text" class="role-input" placeholder="Role (e.g. Lead)">
          <input type="text" class="name-input" placeholder="Name (e.g. Miller)">
          <button onclick="addCast(this)">+ Add</button>
        </div>
      </div>
    `;
    // wire enter-key on name input
    const nameInput = li.querySelector('.name-input');
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addCast(li.querySelector('.cast-add button'));
      }
    });
    list.appendChild(li);
  });
  updateProgress();
}

function handleCheck(cb) {
  cb.closest('li').classList.toggle('checked-item', cb.checked);
  updateProgress();
}

function toggleExpand(btn) {
  btn.closest('li').classList.toggle('expanded');
}

function startEdit(btn, ideaIdx) {
  const li = btn.closest('li');
  const ideaDiv = li.querySelector('.idea');
  const currentText = ideas[ideaIdx].replace(/<em>/g, '*').replace(/<\/em>/g, '*');

  // Save original HTML so we can restore on cancel
  const originalHtml = ideaDiv.innerHTML;

  ideaDiv.innerHTML = `
    <textarea class="idea-edit">${escapeHtml(currentText)}</textarea>
    <div class="idea-edit-actions">
      <button class="edit-save">Save</button>
      <button class="edit-cancel">Cancel</button>
    </div>
  `;

  const textarea = ideaDiv.querySelector('textarea');
  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);
  // auto-size
  textarea.style.height = Math.max(40, textarea.scrollHeight) + 'px';
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
  });

  ideaDiv.querySelector('.edit-save').onclick = () => {
    const newText = textarea.value.trim();
    if (newText) {
      // Convert *text* back to <em> tags
      const formatted = escapeHtml(newText).replace(/\*([^*]+)\*/g, '<em>$1</em>');
      ideas[ideaIdx] = formatted;
      li.dataset.text = newText.toLowerCase();
      ideaDiv.innerHTML = formatted;
      scheduleSave();
    } else {
      ideaDiv.innerHTML = originalHtml;
    }
  };

  ideaDiv.querySelector('.edit-cancel').onclick = () => {
    ideaDiv.innerHTML = originalHtml;
  };

  // Keyboard: Escape = cancel, Ctrl/Cmd+Enter = save
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      ideaDiv.querySelector('.edit-cancel').click();
    } else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      ideaDiv.querySelector('.edit-save').click();
    }
  });
}

function addCast(btn) {
  const panel = btn.closest('.panel');
  const roleInput = panel.querySelector('.role-input');
  const nameInput = panel.querySelector('.name-input');
  const role = roleInput.value.trim();
  const name = nameInput.value.trim();
  if (!name) return;
  const list = panel.querySelector('.cast-list');
  const chip = document.createElement('div');
  chip.className = 'cast-chip';
  chip.innerHTML = `
    ${role ? `<span class="role">${escapeHtml(role)}</span>` : ''}
    <span>${escapeHtml(name)}</span>
    <button class="remove" onclick="this.parentElement.remove(); updateContentIndicator(this);" title="Remove">×</button>
  `;
  list.appendChild(chip);
  roleInput.value = '';
  nameInput.value = '';
  nameInput.focus();
  updateContentIndicator(btn);
}

function updateContentIndicator(el) {
  const li = el.closest('li');
  if (!li) return;
  const panel = li.querySelector('.panel');
  const textarea = panel.querySelector('textarea');
  const castChips = panel.querySelectorAll('.cast-chip');
  const hasNotes = textarea && textarea.value.trim().length > 0;
  const hasCast = castChips.length > 0;
  const btn = li.querySelector('.expand-btn');
  if (btn) btn.classList.toggle('has-content', hasNotes || hasCast);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addNewIdea() {
  const input = document.getElementById('new-idea-input');
  const text = input.value.trim();
  if (!text) return;
  const formatted = escapeHtml(text);
  ideas.push(formatted);
  const i = ideas.length - 1;

  // Build just the new li (don't re-render the whole list)
  const li = document.createElement('li');
  li.dataset.id = i;
  li.dataset.text = formatted.replace(/<[^>]+>/g,'').toLowerCase();
  li.innerHTML = `
    <div class="row">
      <div class="num"></div>
      <div class="idea">${ideas[i]}</div>
      <div class="actions-wrap">
        <input type="checkbox" onchange="handleCheck(this)">
        <button class="color-btn gold" title="Favorite" onclick="toggleColor(this,'gold')"></button>
        <button class="color-btn blue" title="Written" onclick="toggleColor(this,'blue')"></button>
        <button class="color-btn red" title="Ready to shoot" onclick="toggleColor(this,'red')"></button>
        <button class="edit-btn" title="Edit" onclick="startEdit(this, ${i})"></button>
        <button class="expand-btn" title="Notes & cast" onclick="toggleExpand(this)"></button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Notes</div>
      <textarea placeholder="Add ideas, shots, locations, references..." oninput="updateContentIndicator(this)"></textarea>
      <div class="panel-label">Cast &amp; Crew</div>
      <div class="cast-list"></div>
      <div class="cast-add">
        <input type="text" class="role-input" placeholder="Role (e.g. Lead)">
        <input type="text" class="name-input" placeholder="Name (e.g. Miller)">
        <button onclick="addCast(this)">+ Add</button>
      </div>
    </div>
  `;
  // wire enter-key on name input (same as render does)
  const nameInput = li.querySelector('.name-input');
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addCast(li.querySelector('.cast-add button'));
    }
  });

  list.appendChild(li);
  input.value = '';

  // highlight the new one
  li.scrollIntoView({ behavior: 'smooth', block: 'center' });
  li.style.transition = 'background 0.6s';
  const row = li.querySelector('.row');
  row.style.background = 'rgba(193,39,45,0.2)';
  setTimeout(() => { row.style.background = ''; }, 900);

  updateProgress();
}

function toggleColor(btn, color) {
  const li = btn.closest('li');
  btn.classList.toggle('active');
  li.classList.toggle(color + '-on', btn.classList.contains('active'));
  updateProgress();
  applyVisibility();
}

function updateProgress() {
  const total = list.children.length;
  const checked = list.querySelectorAll('input[type="checkbox"]:checked').length;
  const gold = list.querySelectorAll('.color-btn.gold.active').length;
  const red = list.querySelectorAll('.color-btn.red.active').length;
  const blue = list.querySelectorAll('.color-btn.blue.active').length;
  document.getElementById('progress').innerHTML =
    `<span>Progress: <strong>${checked}</strong> / ${total} made</span>` +
    `<span><span class="dot gold"></span>${gold} Favorites</span>` +
    `<span><span class="dot blue"></span>${blue} Written</span>` +
    `<span><span class="dot red"></span>${red} Ready</span>`;
}

function clearAll(kind) {
  if (kind === 'checks') {
    list.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
  } else {
    list.querySelectorAll('.color-btn.' + kind).forEach(b => {
      b.classList.remove('active');
      b.closest('li').classList.remove(kind + '-on');
    });
  }
  updateProgress();
}

const activeFilters = new Set();

function toggleFilter(color) {
  const btn = document.querySelector(`.filter-btn[data-filter="${color}"]`);
  if (activeFilters.has(color)) {
    activeFilters.delete(color);
    btn.classList.remove('active');
  } else {
    activeFilters.add(color);
    btn.classList.add('active');
  }
  applyVisibility();
}

function applyVisibility() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  list.querySelectorAll('li').forEach(li => {
    let visible = true;
    // filter by color
    if (activeFilters.size > 0) {
      let matches = false;
      activeFilters.forEach(c => {
        if (li.classList.contains(c + '-on')) matches = true;
      });
      if (!matches) visible = false;
    }
    // filter by search
    if (q && !li.dataset.text.includes(q)) visible = false;
    li.classList.toggle('hidden', !visible);
  });
}

document.getElementById('search').addEventListener('input', applyVisibility);

// initial render
// ============ SAVE / LOAD STATE ============
const STORAGE_KEY = 'movie-ideas-eli-v1';

function saveState() {
  try {
    const items = Array.from(list.querySelectorAll('li')).map(li => {
      const ideaIdx = parseInt(li.dataset.id);
      const text = ideas[ideaIdx];
      const checked = li.querySelector('input[type="checkbox"]').checked;
      const gold = li.classList.contains('gold-on');
      const blue = li.classList.contains('blue-on');
      const red = li.classList.contains('red-on');
      const notes = li.querySelector('.panel textarea').value;
      const cast = Array.from(li.querySelectorAll('.cast-chip')).map(chip => {
        const role = chip.querySelector('.role');
        const name = chip.querySelector('span:not(.role)');
        return {
          role: role ? role.textContent : '',
          name: name ? name.textContent : ''
        };
      });
      return { text, checked, gold, blue, red, notes, cast };
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, savedAt: Date.now() }));
  } catch (err) {
    console.warn('Save failed:', err);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (err) {
    console.warn('Load failed:', err);
    return null;
  }
}

function applyState(saved) {
  if (!saved || !saved.items) return false;
  // Replace ideas with saved order
  ideas = saved.items.map(item => item.text);
  render(ideas.map((_, i) => i));
  // Now apply per-row state
  const lis = list.querySelectorAll('li');
  saved.items.forEach((item, i) => {
    const li = lis[i];
    if (!li) return;
    if (item.checked) {
      const cb = li.querySelector('input[type="checkbox"]');
      cb.checked = true;
      li.classList.add('checked-item');
    }
    ['gold', 'blue', 'red'].forEach(color => {
      if (item[color]) {
        const btn = li.querySelector(`.color-btn.${color}`);
        if (btn) {
          btn.classList.add('active');
          li.classList.add(color + '-on');
        }
      }
    });
    if (item.notes) {
      li.querySelector('.panel textarea').value = item.notes;
    }
    if (item.cast && item.cast.length) {
      const castList = li.querySelector('.cast-list');
      item.cast.forEach(c => {
        const chip = document.createElement('div');
        chip.className = 'cast-chip';
        chip.innerHTML = `
          ${c.role ? `<span class="role">${escapeHtmlSafe(c.role)}</span>` : ''}
          <span>${escapeHtmlSafe(c.name)}</span>
          <button class="remove" onclick="this.parentElement.remove(); updateContentIndicator(this);" title="Remove">×</button>
        `;
        castList.appendChild(chip);
      });
    }
    updateContentIndicator(li);
  });
  updateProgress();
  return true;
}

function escapeHtmlSafe(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ AUTO-SAVE: hook into all state changes ============
// debounce so we don't save on every keystroke
let saveTimer = null;
function scheduleSave() {
  const indicator = document.getElementById('save-indicator');
  if (indicator) {
    indicator.textContent = '· Saving...';
    indicator.classList.add('saving');
  }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveState();
    if (indicator) {
      indicator.textContent = '✓ Saved automatically';
      indicator.classList.remove('saving');
    }
  }, 400);
}

// Listen for any change inside the list
list.addEventListener('input', scheduleSave);
list.addEventListener('change', scheduleSave);
list.addEventListener('click', () => setTimeout(scheduleSave, 100));

// ============ EXPORT / IMPORT BACKUP ============
function exportBackup() {
  saveState();
  const data = localStorage.getItem(STORAGE_KEY);
  if (!data) { alert('Nothing to back up yet.'); return; }
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `movie-ideas-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('This will replace your current ideas with the backup. Continue?')) {
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.items || !Array.isArray(data.items)) throw new Error('Invalid backup');
      localStorage.setItem(STORAGE_KEY, e.target.result);
      location.reload();
    } catch (err) {
      alert('That file doesn\'t look like a valid backup.');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ============ INIT ============
const saved = loadState();
if (saved && saved.items && saved.items.length > 0) {
  applyState(saved);
} else {
  render(ideas.map((_,i)=>i));
}
</script>
